<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule a Call - fyi by shreyash</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #F7F5F0;
            --surface: #FFFFFF;
            --border: #E4E0D8;
            --text-primary: #1A1814;
            --text-secondary: #6B6459;
            --text-muted: #9C9589;
            --blue: #1E4D8C;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        header {
            padding: 1.25rem 2.5rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .logo-fyi {
            font-family: 'DM Serif Display', serif;
            font-size: 28px;
            color: var(--blue);
            font-weight: 400;
        }

        .logo-by {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        nav a:hover {
            background: var(--bg);
            color: var(--blue);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 36px;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .cal-wrapper {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        #my-cal-inline {
            width: 100%;
            height: 700px;
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem 1.5rem;
            }

            .container {
                padding: 2rem 1rem;
            }

            .page-header h1 {
                font-size: 28px;
            }

            #my-cal-inline {
                height: 600px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" style="text-decoration: none;">
            <div class="logo">
                <span class="logo-fyi">fyi</span>
                <span class="logo-by">by shreyash</span>
            </div>
        </a>
        <nav>
            <a href="/">← Back</a>
        </nav>
    </header>

    <div class="container">
        <div class="page-header">
            <h1>Schedule a Call</h1>
            <p>Choose a time that works for you</p>
        </div>

        <div class="cal-wrapper">
            <div id="my-cal-inline"></div>
        </div>
    </div>

    <!-- Cal.com Inline Embed -->
    <script type="text/javascript">
        (function (C, A, L) {
            let p = function (a, ar) { a.q.push(ar); };
            let d = C.document;
            C.Cal = C.Cal || function () {
                let cal = C.Cal;
                let ar = arguments;
                if (!cal.loaded) {
                    cal.ns = {};
                    cal.q = cal.q || [];
                    d.head.appendChild(d.createElement("script")).src = A;
                    cal.loaded = true;
                }
                if (ar[0] === L) {
                    const api = function () { p(api, arguments); };
                    const namespace = ar[1];
                    api.q = api.q || [];
                    if (typeof namespace === "string") {
                        cal.ns[namespace] = cal.ns[namespace] || api;
                        p(cal.ns[namespace], ar);
                        p(cal, ["initNamespace", namespace]);
                    } else p(cal, ar);
                    return;
                }
                p(cal, ar);
            };
        })(window, "https://app.cal.com/embed/embed.js", "init");

        Cal("init", "schedule", { origin: "https://app.cal.com" });

        Cal.ns["schedule"]("inline", {
            elementOrSelector: "#my-cal-inline",
            config: { "layout": "month_view", "useSlotsViewOnSmallScreen": "true" },
            calLink: "shreyashfyi/15min",
        });

        Cal.ns["schedule"]("ui", { "hideEventTypeDetails": false, "layout": "month_view" });
    </script>
</body>
</html>
