<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fyi by shreyash</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #F7F5F0;
            --surface: #FFFFFF;
            --border: #E4E0D8;
            --text-primary: #1A1814;
            --text-secondary: #6B6459;
            --text-muted: #9C9589;
            --accent: #2A5C45;
            --blue: #1E4D8C;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Header */
        header {
            padding: 1.5rem 3rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .logo-fyi {
            font-family: 'DM Serif Display', serif;
            font-size: 32px;
            color: var(--blue);
            font-weight: 400;
        }

        .logo-by {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 400;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 6px;
            transition: all 0.2s;
            cursor: pointer;
        }

        nav a:hover {
            background: var(--bg);
            color: var(--blue);
        }

        /* Main Content */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 3rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }

        /* Left Section */
        .left-content {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .role-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .company-logo {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
        }

        .role-info h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .role-info a {
            font-size: 14px;
            color: var(--blue);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .role-info a:hover {
            opacity: 0.7;
        }

        /* LinkedIn Posts */
        .posts-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .linkedin-embed {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .linkedin-embed iframe {
            width: 100%;
            border: none;
            display: block;
        }

        /* Right Section - Calendar */
        .calendar-section {
            position: sticky;
            top: 2rem;
        }

        .calendar-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .calendar-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .calendar-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 600;
        }

        #my-cal-inline-15min {
            width: 100%;
            height: 650px;
            overflow: auto;
        }

        /* Auth Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .auth-modal {
            background: var(--surface);
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 400px;
            width: calc(100% - 2rem);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .auth-modal h3 {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            margin-bottom: 0.5rem;
        }

        .auth-modal p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 2rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            background: var(--bg);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--blue);
            background: var(--surface);
        }

        .auth-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--blue);
            color: white;
        }

        .btn-primary:hover {
            background: #163d6f;
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .error-message {
            color: #8C1E1E;
            font-size: 13px;
            margin-top: 0.5rem;
            display: none;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 2rem;
                padding: 2rem 1.5rem;
            }

            header {
                padding: 1.25rem 1.5rem;
            }

            .calendar-section {
                position: static;
            }

            #my-cal-inline-15min {
                height: 500px;
            }

            .logo-fyi {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <span class="logo-fyi">fyi</span>
            <span class="logo-by">by shreyash</span>
        </div>
        <nav>
            <a onclick="openAuthModal()">mentorship</a>
        </nav>
    </header>

    <!-- Main Content -->
    <div class="main-container">
        <!-- Left Section -->
        <div class="left-content">
            <!-- Role Card -->
            <div class="role-card">
                <img src="https://media.licdn.com/dms/image/v2/D560BAQGMdL53JvA5Uw/company-logo_200_200/company-logo_200_200/0/1705661203324/second_brain_labs_logo?e=1779321600&v=beta&t=bvd_H7VG68BBqR9qhKkp_bmJa3SP_fNa8mHazhj-eBY" alt="Second Brain Labs" class="company-logo">
                <div class="role-info">
                    <h2>Agentic AI Engineer</h2>
                    <a href="https://www.linkedin.com/company/sales-automation-sbl" target="_blank">Second Brain Labs</a>
                </div>
            </div>

            <!-- LinkedIn Posts -->
            <div class="posts-section">
                <div class="section-title">Recent Posts</div>
                <div class="posts-grid">
                    <div class="linkedin-embed">
                        <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:share:7437112633746550784" height="500" frameborder="0" allowfullscreen="" title="Embedded post"></iframe>
                    </div>
                    <div class="linkedin-embed">
                        <iframe src="https://www.linkedin.com/embed/feed/update/urn:li:ugcPost:7413999950847524864" height="500" frameborder="0" allowfullscreen="" title="Embedded post"></iframe>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Section - Calendar -->
        <div class="calendar-section">
            <div class="calendar-card">
                <div class="calendar-header">
                    <div class="calendar-title">Book a Session</div>
                </div>
                <div id="my-cal-inline-15min"></div>
            </div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="modal-overlay" id="authModal">
        <div class="auth-modal">
            <h3>Access Mentorship</h3>
            <p>Enter your credentials to continue</p>
            <form class="auth-form" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label>Access Token</label>
                    <input type="text" id="tokenInput" placeholder="Enter token" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="emailInput" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="passwordInput" placeholder="Enter password" required>
                </div>
                <div class="error-message" id="errorMessage">Invalid credentials. Please try again.</div>
                <div class="auth-buttons">
                    <button type="button" class="btn btn-secondary" onclick="closeAuthModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Continue</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Cal.com Embed -->
    <script type="text/javascript">
        (function (C, A, L) {
            let p = function (a, ar) { a.q.push(ar); };
            let d = C.document;
            C.Cal = C.Cal || function () {
                let cal = C.Cal;
                let ar = arguments;
                if (!cal.loaded) {
                    cal.ns = {};
                    cal.q = cal.q || [];
                    d.head.appendChild(d.createElement("script")).src = A;
                    cal.loaded = true;
                }
                if (ar[0] === L) {
                    const api = function () { p(api, arguments); };
                    const namespace = ar[1];
                    api.q = api.q || [];
                    if (typeof namespace === "string") {
                        cal.ns[namespace] = cal.ns[namespace] || api;
                        p(cal.ns[namespace], ar);
                        p(cal, ["initNamespace", namespace]);
                    } else p(cal, ar);
                    return;
                }
                p(cal, ar);
            };
        })(window, "https://app.cal.com/embed/embed.js", "init");

        Cal("init", "15min", { origin: "https://app.cal.com" });

        Cal.ns["15min"]("inline", {
            elementOrSelector: "#my-cal-inline-15min",
            config: { "layout": "month_view" },
            calLink: "shreyashfyi/15min",
        });

        Cal.ns["15min"]("ui", { "hideEventTypeDetails": false, "layout": "month_view" });
    </script>

    <!-- Auth Script -->
    <script>
        function openAuthModal() {
            document.getElementById('authModal').classList.add('show');
            document.getElementById('tokenInput').focus();
        }

        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('show');
            document.getElementById('tokenInput').value = '';
            document.getElementById('emailInput').value = '';
            document.getElementById('passwordInput').value = '';
            document.getElementById('errorMessage').style.display = 'none';
        }

        function handleAuth(event) {
            event.preventDefault();

            const token = document.getElementById('tokenInput').value.toLowerCase().trim();
            const email = document.getElementById('emailInput').value.toLowerCase().trim();
            const password = document.getElementById('passwordInput').value;

            if (token === 'suchi' && email === 'suchitiwari0509@gmail.com' && password === 'suchi9832') {
                sessionStorage.setItem('mentorship_access', 'granted');
                window.location.href = 'suchi.html';
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        // Close modal on outside click
        document.getElementById('authModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeAuthModal();
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeAuthModal();
            }
        });
    </script>
</body>
</html>
